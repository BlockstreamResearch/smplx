[package]
name = "simplex-macros"
version = "0.1.0"
edition = "2024"
rust-version = "1.90.0"
description = "High-level helpers for delivering boilerplate code for SimplicityHL contracts"
license = "MIT OR Apache-2.0"
repository = "https://github.com/BlockstreamResearch/simplicity-contracts"
homepage = "https://github.com/BlockstreamResearch/simplicity-contracts/tree/dev/crates/simplicityhl-core"
readme = "README.md"
documentation = "https://docs.rs/simplicityhl-core"
keywords = ["simplicity", "liquid", "bitcoin", "elements", "macro"]
categories = ["cryptography::cryptocurrencies"]

[lib]
proc-macro = true

[features]
default = ["macros", "derive",]
serde = ["macros", "dep:serde"]
macros = []
derive = []

[lints]
workspace = true

[dependencies]
thiserror = { workspace = true }
simplicityhl = { workspace = true }

serde = { version = "1.0.228", optional = true }
proc-macro-error = { version = "1.0" }
proc-macro2 = { version = "1.0.106", features = ["span-locations"] }
syn = { version = "2.0.114", default-features = false, features = ["proc-macro", "full", "parsing", "derive", "clone-impls", "extra-traits", "printing"] }
quote = { version = "1.0.44" }
